<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discord Gift</title>

<!-- Open Graph -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="Discord Gift">
<meta property="og:title" content="A WILD GIFT APPEARS!">
<meta property="og:description" content="Nitro Expires in 43 hours">
<meta property="og:image" content="https://nugerguy50-afk.github.io/fake-discord-nitro-prank-Present-version/Hello.jpg">
<meta property="og:url" content="https://nugerguy50-afk.github.io/fake-discord-nitro-prank-Present-version/">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:gg sans,"Segoe UI",sans-serif;
}

body{
    background:#313338;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

.card{
    width:920px;
    border-radius:18px;
    overflow:hidden;
    background:
        radial-gradient(circle at 90% 20%, rgba(255,255,255,.05) 2px, transparent 3px),
        radial-gradient(circle at 85% 15%, rgba(255,255,255,.05) 2px, transparent 3px),
        linear-gradient(145deg,#06060b,#08192f 65%,#0d2b50);
    background-size:40px 40px,40px 40px,100% 100%;
    padding:34px;
    color:white;
    box-shadow:0 15px 40px rgba(0,0,0,.45);
}

.title{
    font-size:25px;
    font-weight:800;
    letter-spacing:.5px;
    margin-bottom:36px;
}

.info{
    display:flex;
    align-items:center;
    gap:22px;
    margin-bottom:45px;
}

.icon{
    width:138px;
    height:82px;
    border-radius:12px;
    overflow:hidden;
    flex-shrink:0;
}

.icon img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.name{
    font-size:56px;
    font-weight:600;
    line-height:1;
}

.expire{
    color:#b6b8c1;
    font-size:26px;
    margin-top:10px;
}

.button{
    width:100%;
    height:88px;
    border:none;
    border-radius:14px;
    background:#5865F2;
    color:white;
    font-size:33px;
    font-weight:500;
    cursor:pointer;
    transition:.15s;
}

.button:hover{
    background:#6d79ff;
}

#prankImage{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    object-fit:contain;
    background:black;
    z-index:9999;
}
</style>
</head>
<body>

<div class="card" id="giftCard">

    <div class="title">
        # A WILD GIFT APPEARS!
    </div>

    <div class="info">

        <div class="icon">
            <img src="Hello.jpg" alt="Gift">
        </div>

        <div>
            <div class="name">Nitro</div>
            <div class="expire">Expires in 43 hours</div>
        </div>

    </div>

    <button class="button" onclick="showPrank()">
        Open Gift
    </button>

</div>

<img id="prankImage" src="gorillamiddlefinger.jpg" alt="Prank">

<script>
function showPrank() {
    document.getElementById("giftCard").style.display = "none";
    document.body.style.background = "black";
    document.getElementById("prankImage").style.display = "block";
}
</script>

</body>
</html>
